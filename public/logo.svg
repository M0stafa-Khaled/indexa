<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#grad1)"/>
  
  <!-- Indexa logo design - hierarchical layers -->
  <g transform="translate(256, 256)">
    <!-- Large outer layer -->
    <rect x="-140" y="-140" width="280" height="280" rx="24" fill="none" stroke="white" stroke-width="12" opacity="0.3" filter="url(#shadow)"/>
    
    <!-- Medium middle layer -->
    <rect x="-100" y="-100" width="200" height="200" rx="20" fill="none" stroke="white" stroke-width="12" opacity="0.5"/>
    
    <!-- Small inner layer -->
    <rect x="-60" y="-60" width="120" height="120" rx="16" fill="white" opacity="0.9"/>
    
    <!-- Letter "I" in center -->
    <text x="0" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="800" fill="#6366f1" text-anchor="middle">I</text>
  </g>
</svg>
