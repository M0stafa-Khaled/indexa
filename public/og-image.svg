<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ogGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#ogGrad)"/>
  
  <!-- Pattern overlay -->
  <g opacity="0.1">
    <circle cx="100" cy="100" r="2" fill="white"/>
    <circle cx="150" cy="100" r="2" fill="white"/>
    <circle cx="200" cy="100" r="2" fill="white"/>
    <circle cx="100" cy="150" r="2" fill="white"/>
    <circle cx="150" cy="150" r="2" fill="white"/>
    <circle cx="200" cy="150" r="2" fill="white"/>
  </g>
  
  <!-- Logo on left -->
  <g transform="translate(200, 315)">
    <rect x="-80" y="-80" width="160" height="160" rx="20" fill="none" stroke="white" stroke-width="8" opacity="0.3"/>
    <rect x="-60" y="-60" width="120" height="120" rx="16" fill="none" stroke="white" stroke-width="8" opacity="0.5"/>
    <rect x="-40" y="-40" width="80" height="80" rx="12" fill="white" opacity="0.9"/>
    <text x="0" y="18" font-family="system-ui, sans-serif" font-size="60" font-weight="800" fill="#6366f1" text-anchor="middle">I</text>
  </g>
  
  <!-- Text content -->
  <text x="400" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white">Indexa</text>
  <text x="400" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="400" fill="white" opacity="0.9">Organize Your Digital World</text>
  <text x="400" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="300" fill="white" opacity="0.7">Hierarchical information indexing platform</text>
</svg>
